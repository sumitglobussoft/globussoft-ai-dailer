# ── Dev override — auto-reload on file changes ────────────────────────────────
# Loaded automatically alongside docker-compose.yml. Do NOT use in production.
#
# Backend:  uvicorn --reload on port 8001  → auto-restarts on any .py save
# Frontend: Vite dev server on port 5173   → HMR on any frontend/src/ save
#
# Open http://localhost:5173 in your browser (NOT 8001) during development.

services:

  # ── Backend: Python hot-reload ───────────────────────────────────────────────
  app:
    volumes:
      - .:/app                          # repo mounted → uvicorn --reload sees .py changes
      - /app/frontend/node_modules      # keep container node_modules intact
      - /app/frontend/dist              # keep last built dist (fallback if frontend is down)
      - recordings:/app/recordings
      - faiss_indexes:/app/faiss_indexes
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8001
      --reload
      --reload-dir /app
      --log-level info
    restart: "no"

  # ── Frontend: Vite HMR dev server ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app                 # live source mount → HMR sees every file save
      - /app/node_modules               # keep container node_modules, don't overwrite
    ports:
      - "5173:5173"
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    depends_on:
      - app
    restart: "no"
